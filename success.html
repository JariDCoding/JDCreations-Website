<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="initial-scale=1, width=device-width">
	<title>Aanvraag ontvangen · JDCreations</title>
	<link rel="icon" type="image/svg+xml" href="./favicon.svg">

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap" />
	<link rel="stylesheet" href="./base.css" />
	<link rel="stylesheet" href="./header.css" />
	<link rel="stylesheet" href="./transitions.css" />
	<link rel="stylesheet" href="./footer.css" />
	<script src="./transitions.js"></script>
	<script src="./header.js" defer></script>
	<script src="./footer.js" defer></script>

	<script>
		try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; } catch(e){}
		window.scrollTo(0, 0);
		(function() {
			function fitMobile() {
				var w = window.innerWidth;
				if (w <= 600) { document.documentElement.style.zoom = Math.min(w, 430) / 430; }
				else { document.documentElement.style.zoom = ''; }
			}
			fitMobile();
			window.addEventListener('resize', fitMobile);
		})();
	</script>

	<style>
	html { -webkit-text-size-adjust: 100%; }
	* { box-sizing: border-box; }
	body { margin: 0; background: #07090d; color: #D9DDE5; font-family: 'JetBrains Mono', ui-monospace, monospace; line-height: normal; }

	:root {
		--pad-x: clamp(1.5rem, 6vw, 7rem);
		--rule:  rgba(148,163,184,0.1);
		--dim:   rgba(148,163,184,0.55);
		--green: #9be36a;
	}

	.sc-page {
		padding-top: 84px;
		min-height: 100dvh;
		display: flex;
		flex-direction: column;
	}

	/* ── HERO ─────────────────────────────────────── */
	.sc-hero {
		position: relative;
		overflow: hidden;
		padding: clamp(5rem,12vh,9rem) var(--pad-x) clamp(3rem,6vh,5rem);
		border-bottom: 1px solid var(--rule);
		flex: 1;
	}
	.sc-hero::before {
		content: '';
		position: absolute; inset: 0;
		background-image:
			linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
			linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
		background-size: 72px 72px;
		pointer-events: none;
	}

	.sc-inner {
		position: relative; z-index: 1;
		max-width: 820px;
	}

	.sc-eyebrow {
		font-size: 11px; letter-spacing: 0.38em; text-transform: uppercase;
		color: rgba(148,163,184,0.45); margin: 0 0 2rem;
		display: flex; align-items: center; gap: 12px;
	}
	.sc-eyebrow::before {
		content: '';
		display: inline-block; width: 24px; height: 1px;
		background: var(--green); flex-shrink: 0;
	}

	.sc-h1 {
		font-family: 'Bebas Neue', sans-serif;
		font-size: clamp(52px, 7vw, 110px);
		letter-spacing: 0.06em; line-height: 0.9;
		color: #D9DDE5; margin: 0 0 clamp(2rem,5vh,4rem);
	}
	.sc-h1-dim { color: rgba(148,163,184,0.18); }

	.sc-body {
		font-size: clamp(13px, 1vw, 15px); letter-spacing: 0.07em; line-height: 1.95;
		color: rgba(148,163,184,0.65);
		max-width: 520px;
		margin: 0 0 clamp(2.5rem,6vh,4.5rem);
	}
	.sc-body strong {
		color: #D9DDE5; font-weight: 400;
	}

	.sc-back {
		display: inline-flex; align-items: center;
		font-family: 'Bebas Neue', sans-serif;
		font-size: clamp(18px, 1.8vw, 26px); letter-spacing: 0.22em;
		color: rgba(148,163,184,0.4); text-decoration: none;
		transition: color 0.2s;
	}
	.sc-back-text { color: #D9DDE5; margin: 0 0.1em; transition: color 0.2s; }
	.sc-back:hover { color: rgba(255,255,255,0.65); }
	.sc-back:hover .sc-back-text { color: #ffffff; }

	/* Animated reveal line */
	.sc-hline {
		position: absolute; bottom: 0; left: 0;
		width: 100%; height: 1px;
		background: rgba(255,255,255,0.04);
		overflow: hidden;
	}
	.sc-hline::after {
		content: '';
		position: absolute; left: 0; top: 0;
		height: 100%; width: 100%;
		background: rgba(255,255,255,0.55);
		transform: scaleX(0); transform-origin: left;
		transition: transform 1.1s cubic-bezier(0.22,0.61,0.36,1) 0.15s;
	}
	body.loader-gone .sc-hline::after { transform: scaleX(1); }

	/* Green accent line top-left */
	.sc-accent {
		position: absolute; top: clamp(5rem,12vh,9rem); left: var(--pad-x);
		width: 2px; height: 0;
		background: var(--green);
		transition: height 0.9s cubic-bezier(0.22,0.61,0.36,1) 0.3s;
	}
	body.loader-gone .sc-accent { height: clamp(32px,4vw,52px); }

	@media (max-width: 600px) {
		.sc-page { padding-top: 64px; }
		.sc-h1 { font-size: 58px; }
	}
	</style>
</head>
<body>

<div class="sc-page">
	<section class="sc-hero">
		<div class="sc-accent"></div>
		<div class="sc-inner">
			<p class="sc-eyebrow">/ AANVRAAG VERSTUURD</p>
			<h1 class="sc-h1">
				<span class="sc-h1-dim">[ </span>AANVRAAG<br>ONTVANGEN<span class="sc-h1-dim"> ]</span>
			</h1>
			<p class="sc-body">
				Je aanvraag is goed aangekomen.<br>
				<strong>Ik neem binnen 48 uur contact op</strong> — geen geautomatiseerde replies,<br>
				gewoon direct en eerlijk.
			</p>
			<a class="sc-back" href="./index.html">
				<span>[ </span><span class="sc-back-text">TERUG NAAR HOME &rarr;</span><span> ]</span>
			</a>
		</div>
		<div class="sc-hline"></div>
	</section>
</div>

</body>
</html>
