	* { box-sizing: border-box; }

	/* ═══════════════════════════

	═══════════════════════════ */
	.pj-hero {
		position: relative;
		overflow: hidden;
		padding: clamp(1.5rem, 3vh, 2.5rem) clamp(1.5rem, 7vw, 7rem) clamp(1.25rem, 2.5vh, 2rem);
		border-bottom: 1px solid rgba(148,163,184,0.12);
	}
	.pj-hero::before {
		content: '';
		position: absolute; inset: 0;
		background-image:
			linear-gradient(rgba(255,255,255,0.014) 1px, transparent 1px),
			linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
		background-size: 72px 72px;
		pointer-events: none; z-index: 0;
	}
	.pj-hero::after {
		content: '';
		position: absolute; inset: 0;
		background: var(--pj-bg, linear-gradient(160deg,#090d1a 0%,#07090d 100%));
		opacity: 0.52;
		pointer-events: none; z-index: 0;
	}
	.pj-hero-inner {
		position: relative; z-index: 1;
		max-width: 1100px;
	}

	/* ── Back link ── */
	.pj-back {
		display: inline-flex; align-items: center; gap: 10px;
		font-family: 'JetBrains Mono', ui-monospace, monospace;
		font-size: 9px; letter-spacing: 0.38em; text-transform: uppercase;
		color: rgba(148,163,184,0.5); text-decoration: none;
		margin-bottom: clamp(0.75rem, 2vh, 1.5rem);
		transition: color 0.2s ease;
	}
	.pj-back:hover { color: #ffffff; }
	.pj-back-arr { display: inline-block; transform: scaleX(-1); font-size: 11px; }

	.pj-meta {
		display: flex; align-items: center; gap: 14px;
		margin-bottom: 0.5rem;
	}
	.pj-num {
		font-family: 'JetBrains Mono', ui-monospace, monospace;
		font-size: 9px; letter-spacing: 0.38em;
		color: rgba(148,163,184,0.4); text-transform: uppercase;
	}
	.pj-num-sep { width: 20px; height: 1px; background: rgba(148,163,184,0.22); }

	.pj-h1 {
		font-family: 'Bebas Neue', ui-sans-serif, sans-serif;
		font-size: clamp(48px, 6vw, 88px);
		letter-spacing: 0.05em; color: #d9d9d9;
		line-height: 0.9; margin: 0;
	}
	.pj-type {
		font-family: 'JetBrains Mono', ui-monospace, monospace;
		font-size: clamp(9px, 0.9vw, 11px); letter-spacing: 0.34em;
		color: rgba(148,163,184,0.5); text-transform: uppercase;
		margin-top: 1.25rem;
	}

	/* Accent bar */
	.pj-accent-bar {
		width: 0; height: 1px;
		background: rgba(255,255,255,0.25);
		margin-top: 1.5rem;
		animation: pj-bar-grow 0.9s cubic-bezier(0.65,0,0.35,1) 0.3s forwards;
	}

	/* ═══════════════════════════
	   SVG DRAWING ANIMATION
	═══════════════════════════ */
	@keyframes pj-draw {
		from { stroke-dashoffset: var(--dash-len, 200); }
		to   { stroke-dashoffset: 0; }
	}
	@keyframes pj-bar-grow { to { width: 56px; } }
	@keyframes pj-scan {
		from { transform: scaleX(0); }
		to   { transform: scaleX(1); }
	}

	/* Corner SVGs positioned inside hero/mockup */
	.pj-corners { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
	.pj-corner-svg {
		position: absolute;
		pointer-events: none;
	}
	.pj-corner-svg path {
		fill: none;
		stroke: rgba(148,163,184,0.2);
		stroke-width: 1;
		stroke-dasharray: var(--dash-len, 90);
		stroke-dashoffset: var(--dash-len, 90);
		animation: pj-draw var(--dur, 0.6s) cubic-bezier(0.65,0,0.35,1) var(--del, 0s) forwards;
	}
	.pj-corner-svg--accent path {
		stroke: var(--pj-accent-color, rgba(155,227,106,0.45));
		opacity: 0.5;
	}

	/* Scan line across hero */
	.pj-scan {
		position: absolute; z-index: 1; pointer-events: none;
		left: 0; right: 0;
		height: 1px;
		background: rgba(148,163,184,0.06);
		top: 50%;
		transform-origin: left;
		transform: scaleX(0);
		animation: pj-scan 1.4s cubic-bezier(0.65,0,0.35,1) 0.5s forwards;
	}
	.pj-scan::before, .pj-scan::after {
		content: '';
		position: absolute; top: -2px;
		width: 5px; height: 5px;
		border-radius: 50%;
		background: rgba(255,255,255,0.4);
		opacity: 0.45;
		animation: pj-dot-appear 0.3s ease forwards;
		animation-fill-mode: both;
	}
	.pj-scan::before { left: 0; animation-delay: 0.5s; }
	.pj-scan::after  { right: 0; animation-delay: 1.9s; }
	@keyframes pj-dot-appear { from { opacity: 0; transform: scale(0); } to { opacity: 0.45; transform: scale(1); } }

	/* ═══════════════════════════
	   BODY
	═══════════════════════════ */

		display: grid;
		grid-template-columns: 1fr 1.6fr;
		gap: clamp(2rem, 4vw, 4rem);

	.pj-mockup-bar {

	/* ── Video player ── */

		position: relative;

	/* ── 404 ── */
	.pj-notfound {

	/* ═══════════════════════════
	   RESPONSIVE
	═══════════════════════════ */
	@media (max-width: 900px) {
		.pj-body { grid-template-columns: 1fr; gap: 2rem; }

/* ── Draw corner brackets as small absolute SVGs ── */
function cornerBrackets(container, strokeColor, size, inset, baseDelay) {
	size   = size   || 18;
	inset  = inset  || 14;
	baseDelay = baseDelay || 0.15;
	strokeColor = strokeColor || 'rgba(148,163,184,0.22)';

	/* Corners: [top, left, pathD, dashLen] */
	const W = size + 4, H = size + 4;
	const defs = [
		{ t: inset, l: inset,           d:`M${size} 0 L 0 0 L 0 ${size}`,  len: size*2, del: baseDelay      },
		{ t: inset, r: inset,           d:`M 0 0 L${size} 0 L${size} ${size}`, len: size*2, del: baseDelay+0.1 },
		{ b: inset, l: inset,           d:`M 0 0 L 0 ${size} L${size} ${size}`, len: size*2, del: baseDelay+0.2 },
		{ b: inset, r: inset,           d:`M${size} 0 L${size} ${size} L 0 ${size}`, len: size*2, del: baseDelay+0.3 },
	];

	const ns = 'http://www.w3.org/2000/svg';
	defs.forEach(function(def) {
		var svg = document.createElementNS(ns, 'svg');
		svg.setAttribute('width',  W);
		svg.setAttribute('height', H);
		svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
		svg.setAttribute('aria-hidden', 'true');
		svg.setAttribute('class', 'pj-corner-svg');

		var s = Object.assign(svg.style, { position:'absolute', pointerEvents:'none', zIndex:'2' });
		if (def.t !== undefined) svg.style.top    = def.t + 'px';
		if (def.b !== undefined) svg.style.bottom = def.b + 'px';
		if (def.l !== undefined) svg.style.left   = def.l + 'px';
		if (def.r !== undefined) svg.style.right  = def.r + 'px';

		var path = document.createElementNS(ns, 'path');
		path.setAttribute('d', def.d);
		path.setAttribute('fill', 'none');
		path.setAttribute('stroke', strokeColor);
		path.setAttribute('stroke-width', '1');
		/* Use vector-effect for non-distorted stroke */
		path.setAttribute('vector-effect', 'non-scaling-stroke');
		var len = def.len;
		path.style.cssText = (
			'stroke-dasharray:' + len + ';' +
			'stroke-dashoffset:' + len + ';' +
			'animation:pj-draw 0.55s cubic-bezier(0.65,0,0.35,1) ' + def.del + 's forwards'
		);

		svg.appendChild(path);
		container.appendChild(svg);
	});
}

/* ── Intersection observer ── */
function observeSections() {
	if (!('IntersectionObserver' in window)) {
		document.querySelectorAll('.pj-section').forEach(function(el){ el.classList.add('is-visible'); });
		return;
	}
	var io = new IntersectionObserver(function(entries) {
		entries.forEach(function(e) {
			if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); }
		});
	}, { threshold: 0.2 });
	document.querySelectorAll('.pj-section').forEach(function(el){ io.observe(el); });
}

					'<span>TERUG NAAR PROJECTS</span>' +
				'</a>' +
				'<div class="pj-meta">' +
					'<span class="pj-num">' + p.num + '</span>' +
					'<span class="pj-num-sep" aria-hidden="true"></span>' +
				'</div>' +
				'<h1 class="pj-h1">' + p.title + '</h1>' +
				'<p class="pj-type">' + p.type + '</p>' +
				'<div class="pj-accent-bar" aria-hidden="true"></div>' +
			'</div>' +
		'</div>' +

		'<div class="pj-body">' +
			'<div class="pj-info">' +
				'<div class="pj-section">' +
					'<p class="pj-label">Over het project</p>' +
					'<p class="pj-desc">' + p.desc + '</p>' +
				'</div>' +
				'<div class="pj-section">' +
					'<p class="pj-label">Technologi&euml;en &amp; aanpak</p>' +
					'<ul class="pj-tags">' + p.tags.map(function(t){ return '<li>' + t + '</li>'; }).join('') + '</ul>' +
				'</div>' +
				'<div class="pj-cta-section">' +
					'<div class="pj-btns">' +
						visitBtn +
						'<a class="pj-btn pj-btn--secondary" href="./contact.html">' +
							'<span class="pj-br">[ </span><span class="pj-bt">START PROJECT &rarr;</span><span class="pj-br"> ]</span>' +
						'</a>' +
					'</div>' +
					'<div class="pj-btn-underline" aria-hidden="true"></div>' +
				'</div>' +
			'</div>' +

			'<div class="pj-visual">' +
				(p.video
					? '<p class="pj-video-label">Preview</p>' +
					  '<div class="pj-video-wrap">' +
					  '<video src="' + p.video + '" controls autoplay muted loop playsinline></video>' +
					  '</div>'
					: '<div class="pj-mockup" aria-hidden="true">' +
					  '<div class="pj-mockup-inner">' +
					  '<div class="pj-mockup-name">' + p.title + '</div>' +
					  '<div class="pj-mockup-bar"></div>' +
					  '</div>' +
					  '</div>'
				) +
			'</div>' +
		'</div>';

	/* Hero corner brackets */
	var hero = page.querySelector('.pj-hero');
	cornerBrackets(hero, 'rgba(148,163,184,0.18)', 20, 16, 0.15);

	/* Mockup corner brackets — white, matching index.html line aesthetic */
	var mockup = page.querySelector('.pj-mockup');
	if (mockup) cornerBrackets(mockup, 'rgba(255,255,255,0.15)', 14, 10, 0.65);

	requestAnimationFrame(function() {
		observeSections();
		document.documentElement.classList.remove('scroll-locked');
		document.body.classList.add('loader-gone');
	});
}

function renderNotFound() {
	var page = document.getElementById('projPage');
	page.innerHTML =
		'<div class="pj-notfound">' +
			'<h1>404</h1>' +
			'<p>Project niet gevonden</p>' +
			'<a class="pj-btn pj-btn--secondary" href="./projects.html" style="margin-top:1rem">' +
				'<span class="pj-br">[ </span><span class="pj-bt">&larr; TERUG NAAR PROJECTS</span><span class="pj-br"> ]</span>' +
			'</a>' +
		'</div>';
	document.documentElement.classList.remove('scroll-locked');
}

(function init() {
	var slug = new URLSearchParams(location.search).get('p') || '';
	var project = PROJECTS.find(function(p){ return p.slug === slug; });
	if (project) render(project); else renderNotFound();
})();
</script>

</body>
</html>
